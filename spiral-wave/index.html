<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spiral Wave Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #f8f4ee; }
  canvas { display: block; }
  #btn-doodle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.35);
    color: rgba(255,255,255,0.8);
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 8px 20px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  #btn-doodle:hover { background: rgba(0,0,0,0.75); border-color: rgba(255,255,255,0.7); color: #fff; }
  #popover-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #popover-overlay.open { display: flex; }
  #popover-overlay img { max-width: 90vw; max-height: 90vh; display: block; }
</style>
</head>
<body>
<button id="btn-doodle">Original</button>
<div id="popover-overlay">
  <img src="doodle.jpg" alt="Original doodle">
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="sketch.js"></script>
<script>
  const overlay = document.getElementById('popover-overlay');
  document.getElementById('btn-doodle').addEventListener('click', () => overlay.classList.add('open'));
  overlay.addEventListener('click', () => overlay.classList.remove('open'));
</script>
</body>
</html>
