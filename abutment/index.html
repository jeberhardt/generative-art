<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abutment</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    overflow: hidden;
    font-family: monospace;
  }
  canvas { display: block; }

  #panel-toggle {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 20;
    background: #111;
    color: #f0f0f0;
    border: 1px solid #777;
    padding: 7px 14px;
    cursor: pointer;
    font-family: monospace;
    font-size: 13px;
    letter-spacing: 0.05em;
    transition: background 0.15s, color 0.15s;
  }
  #panel-toggle:hover { background: #252525; color: #fff; }
  #panel-toggle:focus-visible { outline: 2px solid #f0f0f0; outline-offset: 3px; }

  #control-panel {
    position: fixed;
    top: 0;
    left: 0;
    width: 200px;
    height: 100vh;
    z-index: 10;
    background: rgba(15, 15, 15, 0.93);
    backdrop-filter: blur(4px);
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 80px 20px 20px;
    transition: transform 0.25s ease;
  }
  #control-panel.hidden {
    transform: translateX(-100%);
  }

  #control-panel button,
  #control-panel a {
    background: transparent;
    color: #f0f0f0;
    border: 1px solid #777;
    padding: 8px 20px;
    cursor: pointer;
    font-family: monospace;
    font-size: 13px;
    letter-spacing: 0.05em;
    transition: background 0.15s, color 0.15s;
    text-align: left;
    text-decoration: none;
    display: block;
  }
  #control-panel button:hover,
  #control-panel a:hover { background: #252525; color: #fff; }
  #control-panel button:focus-visible,
  #control-panel a:focus-visible { outline: 2px solid #f0f0f0; outline-offset: 3px; }

  #loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 50;
    background: rgba(0, 0, 0, 0.45);
    align-items: center;
    justify-content: center;
  }
  #loading-overlay.active { display: flex; }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(240, 240, 240, 0.15);
    border-top-color: #f0f0f0;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #popover-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #popover-overlay.open { display: flex; }
  #popover-overlay img { max-width: 90vw; max-height: 90vh; display: block; }

  #tutorial-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: flex-start;
    justify-content: center;
    overflow-y: auto;
    padding: 60px 20px;
  }
  #tutorial-overlay.open { display: flex; }
  #tutorial-content {
    background: #1a1a1a;
    color: #e8e8e8;
    font-family: 'Georgia', serif;
    font-size: 15px;
    line-height: 1.75;
    max-width: 680px;
    width: 100%;
    padding: 48px 56px;
  }
  #tutorial-content h1 { font-size: 24px; font-weight: normal; margin-bottom: 8px; color: #fff; }
  #tutorial-content h2 { font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: normal; color: #888; margin: 40px 0 16px; font-family: monospace; }
  #tutorial-content p { margin-bottom: 16px; }
  #tutorial-content pre { background: #111; padding: 20px; overflow-x: auto; margin: 20px 0; }
  #tutorial-content code { font-family: monospace; font-size: 13px; color: #c8e6c9; }
  #tutorial-content pre code { color: #c8e6c9; }
  #tutorial-content hr { border: none; border-top: 1px solid #333; margin: 36px 0; }
  #tutorial-close {
    position: sticky;
    top: 0;
    float: right;
    margin: -12px -12px 0 0;
    background: transparent;
    border: none;
    color: #888;
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 4px 8px;
  }
  #tutorial-close:hover { color: #fff; }
</style>
</head>
<body>

<button id="panel-toggle">☰</button>

<div id="control-panel" class="hidden">
  <a href="../">← main menu</a>
  <button id="regen">↻ regenerate</button>
  <button id="save">↓ save</button>
  <button id="original">original</button>
  <button id="tutorial">tutorial</button>
</div>

<div id="loading-overlay">
  <div class="spinner"></div>
</div>

<div id="popover-overlay">
  <img src="original.jpg" alt="Original doodle">
</div>

<div id="tutorial-overlay">
  <div id="tutorial-content">
    <button id="tutorial-close">✕</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="../shared/download.js"></script>
<script>
  const loadingOverlay = document.getElementById('loading-overlay');
  function showLoading() { loadingOverlay.classList.add('active'); }
  function hideLoading() { loadingOverlay.classList.remove('active'); }
</script>
<script src="sketch.js"></script>
<script>
  const panel = document.getElementById('control-panel');
  document.getElementById('panel-toggle').addEventListener('click', () => {
    panel.classList.toggle('hidden');
  });

  const overlay = document.getElementById('popover-overlay');
  document.getElementById('original').addEventListener('click', () => overlay.classList.add('open'));
  overlay.addEventListener('click', () => overlay.classList.remove('open'));

  const tutorialOverlay = document.getElementById('tutorial-overlay');
  const tutorialContent = document.getElementById('tutorial-content');
  let tutorialLoaded = false;

  document.getElementById('tutorial').addEventListener('click', async () => {
    if (!tutorialLoaded) {
      const res = await fetch('tutorial.md');
      const md = await res.text();
      const closeBtn = tutorialContent.querySelector('#tutorial-close');
      tutorialContent.innerHTML = marked.parse(md);
      tutorialContent.prepend(closeBtn);
      tutorialLoaded = true;
    }
    tutorialOverlay.classList.add('open');
  });

  document.getElementById('tutorial-close').addEventListener('click', () => tutorialOverlay.classList.remove('open'));
  tutorialOverlay.addEventListener('click', (e) => {
    if (e.target === tutorialOverlay) tutorialOverlay.classList.remove('open');
  });
</script>
</body>
</html>
